name: Publish scheduled posts

on:
  schedule:
    # Runs once a day at 06:00 UTC. Adjust if you want a different time.
    - cron: "0 6 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  publish-scheduled:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install gray-matter
        run: npm install gray-matter --no-save

      - name: Publish any posts whose scheduled date has arrived
        run: node scripts/publish-scheduled.mjs

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog
          git diff --staged --quiet || git commit -m "Auto-publish scheduled posts"
          git push
